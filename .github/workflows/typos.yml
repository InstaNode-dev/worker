name: typos

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.30.0
        continue-on-error: true  # warn-only — surface findings without blocking CI
